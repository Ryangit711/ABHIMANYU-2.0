# Portal Scanner Configuration — ABHIMANYU 2.0
# Targets: $120K+, Vancouver/Remote Canada, TEER 0/1, Ops/Strategy roles
# See templates/portals.example.yml for full reference
#
# ATS providers supported by SCAN (45 total):
#   greenhouse, ashby, lever, workday, successfactors, smartrecruiters,
#   bamboohr, breezy, personio, recruitee, teamtailor, workable, rippling,
#   jibeapply, avature, pinpoint, amazon, ibm, comeet, + job boards
#
# Companies using unsupported ATS (Taleo, iCIMS, custom):
#   These stay as generic career URLs — discovered via manual FETCH only

title_filter:
  positive:
    - "operations"
    - "strategy"
    - "chief of staff"
    - "program manager"
    - "program director"
    - "revenue operations"
    - "business operations"
    - "revenue strategy"
    - "head of"
    - "director of"
    - "senior manager"
  negative:
    - "engineer"
    - "software"
    - "developer"
    - "data scientist"
    - "data analyst"
    - "financial analyst"
    - "credit"
    - "accountant"
    - "controller"
    - "veterinary"
    - "nurse"
    - "pharmacist"
    - "technician"
    - "administrative assistant"
    - "executive assistant"
    - "intern"
    - "junior"
    - "sales"
    - "account executive"
    - "customer success"
    - "support"

location_filter:
  always_allow:
    - "Vancouver"
    - "British Columbia"
    - "BC"
    - "Canada"
    - "Remote"
    - "remote"
  block:
    - "India"
    - "Bengaluru"
    - "United Kingdom"
    - "London"
    - "Australia"
    - "Singapore"
    - "Germany"
    - "France"
    - "Japan"
    - "Brazil"
    - "Mexico"

salary_filter:
  min: 80000
  max: 350000
  currency: CAD

scan_history:
  recheck_after_days: 30

tracked_companies:
  # ═══════════════════════════════════════════════════════════════
  # S PIPE (Startups) — SCAN-supported
  # ═══════════════════════════════════════════════════════════════

  # Greenhouse — auto-detected from URL
  - name: Human Agency
    careers_url: https://job-boards.greenhouse.io/humanagency
    enabled: true
  - name: Brex
    careers_url: https://job-boards.greenhouse.io/brex
    enabled: true
  - name: OpenTable
    careers_url: https://job-boards.greenhouse.io/opentable
    enabled: true
  - name: Thinkific
    careers_url: https://job-boards.greenhouse.io/thinkific
    enabled: true
  - name: Marqeta
    careers_url: https://job-boards.greenhouse.io/marqeta
    enabled: true
  - name: Zenoti
    careers_url: https://job-boards.greenhouse.io/zenoti
    enabled: true
  - name: SOCi
    careers_url: https://job-boards.greenhouse.io/soci
    enabled: true

  # Ashby — auto-detected from URL
  - name: 1Password
    careers_url: https://jobs.ashbyhq.com/1password
    enabled: true
  - name: Procurify
    careers_url: https://jobs.ashbyhq.com/procurify
    enabled: true
  - name: Trulioo
